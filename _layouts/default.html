<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 16px;
      line-height: 1.6;
      color: #1a1a1a;
      background: #fff;
    }
    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 48px 24px 96px;
    }
    h1 { font-size: 2em; margin: 0 0 24px; font-weight: 700; }
    h2 { font-size: 1.4em; margin: 48px 0 16px; font-weight: 600; border-bottom: 1px solid #e5e5e5; padding-bottom: 8px; }
    h3 { font-size: 1.15em; margin: 32px 0 12px; font-weight: 600; }
    p { margin: 0 0 16px; }
    a { color: #0969da; text-decoration: none; }
    a:hover { text-decoration: underline; }
    ul, ol { margin: 0 0 16px; padding-left: 24px; }
    li { margin: 0 0 6px; }
    strong { font-weight: 600; }
    code {
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      font-size: 0.9em;
      background: #f5f5f5;
      padding: 2px 6px;
      border-radius: 3px;
    }
    pre {
      background: #f5f5f5;
      padding: 16px;
      border-radius: 6px;
      overflow-x: auto;
      margin: 0 0 16px;
      font-size: 0.85em;
      line-height: 1.5;
    }
    pre code { background: none; padding: 0; }
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 0 0 16px;
      font-size: 0.95em;
    }
    th, td {
      text-align: left;
      padding: 10px 12px;
      border: 1px solid #e5e5e5;
    }
    th { background: #f9f9f9; font-weight: 600; }
  </style>
</head>
<body>
  <div class="container">
    {{ content }}
  </div>
</body>
</html>
